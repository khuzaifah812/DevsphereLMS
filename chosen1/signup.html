        body{
            background-color: rgb(240, 240,720);
            opacity:0;
            animation: fadeIn 0.5s forwards;
            animation-delay: 0.3s;
         }
         @keyframes fadeIn{
            to{
                opacity:1;
            }
         }
         .container{
            display: flex;
            flex-direction:column;
            align-items:center;
            width: 50%;
            margin:auto;
            margin-top: 50px;
            gap: 8px;
            background-color:aliceblue;
            box-shadow: 0 4px 6px #ccc;
         }
         .container input{
            padding: 5px;
            border-radius: 5px;
            border: 1px solid black;
            outline: none; 
            background-color: transparent; 
            transition: 0.3s ease;

         }
         .container input:hover{
            transform: scale(1.05);
            border: 1px solid rgb(0, 190, 200);

         }
         .container label{
            font-size: 15px;
         }
         .container button{
            margin: 10px;
            padding: 15px;
            border-radius: 5px;
            border: none;
            cursor:pointer;
            font-weight: bold;background-color: rgb(100, 200, 300);
            font-size: 15px;
         }
         .container button:hover{
            background-color: rgb(0, 200, 300);
            transform: scale(1.08);
            transition: all 0.3s ease-in-out;
         }
         .container p{
            text-align: center;
            margin-top: 10px;
            font-size: 16px;
            width: 100%;
         }
        h1{
            text-align: center;
            margin-top: 20px;
            color: rgb(0, 190, 200);
        } 
        #footer p{
            text-align: center;
            color: rgb(0, 190, 200);
        }
        @media(max-width: 768px){
            .container{
                width: 80%;
            }
        }
    </style>

<body>
    <h1>Library Management System</h1>  
        <form action="/signup" method="POST">
        <div class="container">
            <h1>Signup</h1>
            <label for="userid">Registration ID:</label>
            <input class="input" type="text" id="userid" name="userid" placeholder="Enter Registration ID" required>

            <label for="username">UserName:</label>
            <input class="input" type="text" id="username" name="username" placeholder="Enter UserName" required>
            
            <label for="email">Email:</label>
            <input class="input" type="email" id="email" name="email" required placeholder="example@gmail.com">
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" maxlength="8" placeholder="8 characters" required>

            <label for="cpassword">Confirm Password:</label>
            <input type="password" id="cpassword" name="password" maxlength="8" placeholder="8 characters" required>
            
            <button type="submit">Sign Up</button>

             <p>Already have an account? <a href="login.html">Login </a></p>
        </div>
        </form>
