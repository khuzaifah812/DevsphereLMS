<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Library Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1><center>LIBRARY MANAGEMENT SYSTEM</center></h1>
</header>

<main>
  <div class="card">
    <h2>Sign Up</h2>
    <p class="subtitle">Create an account to get started.</p>

    <form id="signupForm" novalidate>
      <div class="field">
        <label for="userId">User ID</label>
        <input type="text" id="userId" name="userId" required>
        <span class="hint" id="userIdHint"></span>
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
        <span class="hint" id="usernameHint"></span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
        <span class="hint" id="emailHint"></span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password">
        <span class="hint" id="passwordHint"></span>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
        <span class="hint" id="confirmHint"></span>
      </div>

      <button type="submit" class="submit">Sign Up</button>
    </form>

    <p class="switch">Already have an account? <a href="login.html">Log In</a></p>
  </div>
</main>

<footer>&copy; 2026 Library Management System</footer>

<script>
document.getElementById('signupForm').addEventListener('submit', function (e) {
  e.preventDefault();
  let valid = true;

  const fields = {
    userId: document.getElementById('userId'),
    username: document.getElementById('username'),
    email: document.getElementById('email'),
    password: document.getElementById('password'),
    confirmPassword: document.getElementById('confirmPassword')
  };
  const hints = {
    userId: document.getElementById('userIdHint'),
    username: document.getElementById('usernameHint'),
    email: document.getElementById('emailHint'),
    password: document.getElementById('passwordHint'),
    confirmPassword: document.getElementById('confirmHint')
  };

  Object.values(hints).forEach(h => h.textContent = '');

  if (!fields.userId.value.trim()) {
    hints.userId.textContent = 'User ID is required.';
    valid = false;
  }
  if (!fields.username.value.trim()) {
    hints.username.textContent = 'Username is required.';
    valid = false;
  }
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailPattern.test(fields.email.value.trim())) {
    hints.email.textContent = 'Enter a valid email address.';
    valid = false;
  }
  if (fields.password.value.length < 8) {
    hints.password.textContent = 'Password must be at least 8 characters.';
    valid = false;
  }
  if (fields.confirmPassword.value !== fields.password.value || !fields.confirmPassword.value) {
    hints.confirmPassword.textContent = 'Passwords do not match.';
    valid = false;
  }

  if (valid) {
    // Hook this up to your auth backend (Supabase / FastAPI endpoint).
    alert('Sign up submitted (wire this up to your backend).');
  }
});
</script>

</body>
</html>
