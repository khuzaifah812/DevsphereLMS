<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Signup</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <h1>Library Management System</h1>
     <p>Create an account to access Library Services.</p>
</div> 
<div class="section-1"> 
       <form class="Signup-form">
          <h2>Create an account</h2>
             <div class="input">
<label>Full Name</label> <br><br>
<input type="text" placeholder="Enter your full name" required> <br><br>
</div>
<div class="input">
<label>Student Registration Number</label>  <br><br>
<input type="text" placeholder="Enter your student Registration Number" required> <br> <br>
</div>
<div class="input">
<label>Email Address</label> <br><br>
<input type="email" placeholder=".....@gamil.com" required> <br><br>
</div>
<div class="input">
<label>Password</label> <br><br>
<input type="password" placeholder="Create a password" required> <br><br>
<small class="password-notice">Password must be 8-16 characters </small> <br><br>
<label>Confirm password</label> <br><br>
<input type="password" placeholder="Confirm password" required> <br><br>
</div>
<div class="checkbox">
<input type="checkbox" required>
<span>I agree to the the terms and conditions</span>
</div> <br><br>
<button type="submit">Create Account</button> <br><br>
<div class="divider">
<span>OR</span>
</div>
<div class="google-box">
    <a href="#"> 
<img src="images/google.jpeg" alt="google Logo" width="700">
<span>Continue with Google</span>
</a>
</div>
<p class="login-link">
           Already have an account?
<a href=""> Sign in</a>
</p>

</form>
</div>
</div>
</body>
</html>
