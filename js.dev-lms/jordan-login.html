<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="jordan-login.css">
  <link rel="icon" href="logos.png" type="image/png">
</head>
<body>
  <div class="navbar">
    <h2 class="lms">
      Learning Management System
    </h2>
  </div>
  <form action="" class="container">
    <div class="txt">
      <h2>Login</h2>
    </div>
    <div class="start">
      <p>Login your account to continue</p>
    </div>
    <div class="gaps">
      <label for="username">Username or Email</label>
      <input type="text" id="username" placeholder="Username or Email">
    </div>

    <div class="gaps">
      <label for="password">Password</label>
      <input  id="password" type="password" placeholder="Password">
    </div>

    <div class="gap-check">
      <div class="box">      
      <input type="checkbox" name="" id="remember-me">
      <label for="remember-me">Remember me</label></div>
      <div class="text">
        <a href="#">Forgot password?</a>
      </div>
    </div>
    <div class="gaps">
      <button class="login-Btn">Log in</button>
    </div>

    <div class="gap-alt">
      <p>Don't have an account? <a href="jordan-sign-up.html">Sign up</a></p>
    </div>
  </form>
</body>
</html>
