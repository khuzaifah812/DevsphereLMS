<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS</title>
  <link rel="icon" href="logos.png" type="image/png">
  <link rel="stylesheet" href="jordan-sign-up.css">
</head>
<body>
    <div class="sign">
    <h2 class="lms">
    Library Management System
  </h2>
    </div>

<!--user id, user name, user password, user email-->
<form action="" class="cont">
<div class="container">
  <h3>Sign Up</h3>
  <p id="text">Create an account to get started</p>
  <div class="gaps">
  <label for="inputs-userid" id="ladel">User ID</label>
  <input type="text" id="inputs-userid" name="id" placeholder="User ID" >
  </div>

  <div class="gaps">
  <label for="inputs-username" id="ladel">Username</label>
  <input type="text" id="inputs-username" name="name" placeholder="Username" >
  </div>

  <div class="gaps">
  <label for="inputs-email" id="ladel">Email</label>
  <input type="email" id="inputs-email" name="email" placeholder="Email" >
  </div>

  <div class="gaps">  
  <label for="inputs-password" id="ladel">Password</label>
  <input type="password" id="inputs-password" name="password" placeholder="Password" >
  </div>


  <div class="gaps">
  <label for="inputs-confirm-password" id="ladel">Confirm Password</label>
  <input type="password" id="inputs-confirm-password" name="confirm_password" placeholder="Confirm Password" >
  </div>

  <div class="btn">
      <button id="signup-Btn">Sign Up</button>
  </div>

  <div class="para">
  <p class="alt" >
  Already have an account? <a href="jordan-login.html">Login</a></p>
  </div>
</div>
</form>
</body>
</html>
