<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Login</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <h1>Library Management System</h1>
     <p>Create an account to access Library Services.</p>
</div> 
<div class="section-1"> 
       <form class="card">
          <h2>Welcome back!</h2>
<div class="input">
<label>Email Address</label> <br><br>
<input type="email" placeholder=".....@gamil.com" required> <br><br>
</div>
<div class="input">
<label>Password</label> <br><br>
<input type="password" placeholder="Enter your password" required> <br><br>
</div>
<div class="login-ops">
<div class="remember-me">
<input type="checkbox">
<label>Remember me</label> <br><br>
</div>
<div class="Forgot-password">
<a href="#">Forgot Password</a>
</div>
</div>
 <br><br>
<button type="submit">Login</button> <br><br>
<div class="divider">
<span>OR</span>
</div>
<div class="google-box">
    <a href="#"> 
<img src="images/google.jpeg" alt="google Logo" width="700">
<span>Continue with Google</span>
</a>
</div>
<p class="login-link">
           Don't have an account?
<a href="signup.html"> Create an Account</a>
</p>

</form>
</div>
</div>
</body>
</html>
