<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        body{
            background-color: rgb(240, 240,720);
            opacity:0;
            animation: fadeIn 0.5s forwards;
            animation-delay: 0.3s;
        }
         @keyframes fadeIn{
            to{
                opacity:1;
            }
        }
        .container{
            display: flex;
            flex-direction:column;
            align-items:center;
            width: 50%;
            margin:auto;
            margin-top: 50px;
            gap: 8px;
            background-color:aliceblue;
            box-shadow: 0 4px 6px #ccc;
         }  
        .container input{
            padding: 5px;
            border-radius: 5px;
            border: 1px solid black;
            outline: none; 
            background-color: transparent;
         }
        .container input:hover{
            border-color: rgb(100, 200, 300);
            transform: scale(1.05);
         }
        label{
            font-size: 15px;
            text-align: left;
            padding-top: 20px;
            padding-bottom: 0;
         }
         #button{
            margin: 10px;
            padding: 15px;
            border-radius: 5px;
            border: none;
            cursor:pointer;
            font-weight: bolder;background-color: rgb(100, 200, 300);
            font-size: 15px;
            font-size: 1.1em;
         }
         #button:hover{
            background-color: rgb(0, 200, 300);
            transform: scale(1.08);
            transition: all 0.3s ease-in-out;
         }
         h1{
            text-align: center;
            margin-top: 20px;
            color: rgb(0, 190, 200);
        } 
        .container h1{
            text-align: center;
            margin-top: 20px;
            color: rgb(0, 190, 200);
            font-size: 34px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
        } 
        .options{
            width: 70%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .remember{
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0;
            font-size: 15px;
        }

        .remember input{
            transform: scale(1.1);
            cursor: pointer;
        }

        .options a{
            text-decoration: none;
            color: rgb(0, 190, 200);
            font-size: 15px;
        }

        .options a:hover{
            text-decoration: underline;
        }
        .container p{
            text-align: center;
            margin-top: 10px;
            font-size: 16px;
            width: 100%;
        } 
        #footer p{
            text-align: center;
            color: rgb(0, 190, 200);
            padding: 8px;
        }
       @media(max-width: 768px){
            .container{
                width: 80%;

            }
            .options{
                width: 100%;
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    
    <h1>Library Management System</h1>    
       <form action="" method="" >
        <div class="container">
          <h1>Login</h1>
          <label for="user">UserName or Email:</label>
          <input type="text" id="user" value="" name="usernameoremail" placeholder="Enter UserName or Email" required>
          <label for="password">Password:</label>
          <input type="password" id="password" value="" name="password" placeholder="Enter 8 Characters" minlength="8" maxlength="8" required >
          <div class="options">
          <label class="remember">
          <input type="checkbox" name="remember">
          Remember Me
        </label>

        <a href="forgotpassword.html">Forgot Password?</a>
</div>
          <input  id="button" type="submit" value="Log in" name="">
          <p>Dont have an account? <a href="signup.html">SignUp </a></p>
          </div>
        </form>
    <footer id="footer">
        <p>&copy; 2026 DEVSHERE All Rights Reserved</p>
    </footer>    
</body>
</html>
